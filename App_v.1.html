<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Manager Ufficio v0.6 - Cloud</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#0f172a; --panel:#111827; --muted:#1f2937; --text:#e5e7eb; 
    --text-dim:#9ca3af; --primary:#3b82f6; --danger:#ef4444; 
    --warning:#f59e0b; --success:#10b981; --card:#0b1220; --border:#334155;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family: system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; height: 100vh; overflow: hidden;
  }
  aside{ width:260px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
  main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header{ padding:20px; font-weight:bold; color:var(--primary); border-bottom:1px solid var(--border); }
  nav{ flex:1; padding:12px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
  .nav-item{ padding:10px 12px; cursor:pointer; border-radius:10px; color:var(--text-dim); transition:0.2s; border:none; background:none; text-align:left; width:100%; font-size:14px;}
  .nav-item:hover, .nav-item.active{ background:rgba(59,130,246,0.1); color:var(--text); }
  .top-bar{ height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px; background:var(--panel); }
  .content{ flex:1; overflow-y:auto; padding:20px; }
  
  #loginOverlay{ position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:999; }
  .login-box{ background:var(--panel); padding:30px; border-radius:16px; border:1px solid var(--border); width:380px; text-align:center; }
  input, select, button{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); margin-top:10px; }
  button.primary{ background:var(--primary); border:none; font-weight:bold; cursor:pointer; }
  .hidden{ display:none; }
</style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-box">
    <h2 style="margin-top:0">Accesso Gestionale</h2>
    <p style="color:var(--text-dim); font-size:14px">Seleziona il tuo profilo per iniziare</p>
    <input type="text" id="loginName" placeholder="Tuo Nome (es. Rossi M.)">
    <select id="loginSection"></select>
    <button id="loginBtn" class="primary">Accedi al Cloud</button>
  </div>
</div>

<aside>
  <div class="sidebar-header">UFF-MANAGER v0.6</div>
  <nav>
    <button class="nav-item active" onclick="switchView('dashboard')">📊 Dashboard</button>
    <button class="nav-item" onclick="switchView('tasks')">🗂 Task (Kanban)</button>
    <button class="nav-item" onclick="switchView('notes')">📝 Note & Appunti</button>
    <button class="nav-item" onclick="switchView('registro')">📑 Registro Smarcamento</button>
  </nav>
  <div style="padding:20px; border-top:1px solid var(--border)">
    <div id="userInfo" style="font-size:12px; color:var(--text-dim); margin-bottom:10px"></div>
    <button onclick="location.reload()" style="background:var(--danger); border:none; padding:8px; font-size:12px; width:100%; color:white; cursor:pointer;">Esci</button>
  </div>
</aside>

<main>
  <div class="top-bar">
    <div id="viewTitle" style="font-weight:bold">DASHBOARD</div>
    <button id="addBtn" class="primary" style="width:auto; margin:0; padding:8px 16px">+ Nuovo</button>
  </div>
  <div class="content" id="mainContent"></div>
</main>

<script>
// CONFIGURAZIONE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCxLfCQ8igfytfdMuiJIN6uSZq2fcY0xuQ",
    authDomain: "task-ufficio.firebaseapp.com",
    projectId: "task-ufficio",
    storageBucket: "task-ufficio.firebasestorage.app",
    messagingSenderId: "435367581032",
    appId: "1:435367581032:web:d77014469b570c9e9672dd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let currentView = 'dashboard';
const sections = ['Capo Ufficio','Droni','Ala Rotante','Ala Fissa','Armamento','Interfaccia UUNN'];

// Popola menu sezioni
const sel = document.getElementById('loginSection');
sections.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });

// LOGICA LOGIN
document.getElementById('loginBtn').onclick = async () => {
    const name = document.getElementById('loginName').value.trim();
    const section = document.getElementById('loginSection').value;
    
    if(!name) { alert("Inserisci il tuo nome!"); return; }

    try {
        console.log("Connessione a Firebase...");
        
        // Registra l'accesso su Firebase
        await db.collection("users").doc(name).set({
            name: name,
            section: section,
            lastLogin: new Date().toISOString()
        }, { merge: true });

        // SALVATAGGIO STATO LOCALE
        currentUser = { name: name, section: section };
        
        // INTERFACCIA
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('userInfo').textContent = `Utente: ${name} (${section})`;
        
        console.log("Login OK!");
        render(); // Mostra la dashboard
        initRealtimeData(); // Attiva la sincronizzazione
        
    } catch (error) {
        console.error("Errore:", error);
        alert("Errore di connessione al database. Controlla le 'Rules' su Firebase!");
    }
};

function switchView(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById('viewTitle').textContent = view.toUpperCase();
    render();
}

function initRealtimeData() {
    db.collection("tasks").onSnapshot(() => render());
}

function render() {
    const container = document.getElementById('mainContent');
    if(!currentUser) return;

    if(currentView === 'dashboard') {
        container.innerHTML = `
            <div style="background:var(--panel); padding:30px; border-radius:15px; border:1px solid var(--border)">
                <h1 style="margin:0; color:var(--primary)">Benvenuto, ${currentUser.name}</h1>
                <p style="color:var(--text-dim)">Il sistema Cloud è attivo e sincronizzato.</p>
                <hr style="border:0; border-top:1px solid var(--border); margin:20px 0">
                <p>Seleziona una voce dal menu a sinistra per gestire i task o il registro.</p>
            </div>`;
    } else {
        container.innerHTML = `<p style="color:var(--text-dim)">Sezione ${currentView} pronta per l'uso.</p>`;
    }
}

// Tasto Nuovo
document.getElementById('addBtn').onclick = async () => {
    if(!currentUser) return;
    const title = prompt(`Cosa vuoi aggiungere in ${currentView}?`);
    if(title) {
        await db.collection(currentView).add({
            title: title,
            author: currentUser.name,
            section: currentUser.section,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
};
</script>
</body>
</html>
