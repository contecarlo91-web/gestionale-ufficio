<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestionale Ufficio v0.7 - Cloud Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --primary:#3b82f6; --border:#334155; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
        aside { width:250px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
        main { flex:1; display:flex; flex-direction:column; }
        .nav-item { padding:15px; cursor:pointer; border:none; background:none; color:#9ca3af; text-align:left; width:100%; }
        .nav-item.active { color:var(--primary); background:rgba(59,130,246,0.1); font-weight:bold; }
        #loginOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .login-box { background:var(--panel); padding:30px; border-radius:15px; border:1px solid var(--border); width:350px; text-align:center; }
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:white; }
        button.primary { background:var(--primary); border:none; cursor:pointer; font-weight:bold; }
        .content { padding:20px; flex:1; overflow-y:auto; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Accesso Gestionale</h2>
        <input type="text" id="loginName" placeholder="Tuo Nome (es. Carlo Conte)">
        <select id="loginSection">
            <option value="Capo Ufficio">Capo Ufficio</option>
            <option value="Droni">Droni</option>
            <option value="Ala Rotante">Ala Rotante</option>
            <option value="Ala Fissa">Ala Fissa</option>
            <option value="Armamento">Armamento</option>
        </select>
        <button id="loginBtn" class="primary">Entra nel Sistema</button>
    </div>
</div>

<aside>
    <div style="padding:20px; font-weight:bold; color:var(--primary)">UFF-MANAGER v0.7</div>
    <nav>
        <button class="nav-item active">📊 Dashboard</button>
    </nav>
    <div style="margin-top:auto; padding:20px; border-top:1px solid var(--border)">
        <div id="userInfoDisplay" style="font-size:12px; margin-bottom:10px"></div>
        <button onclick="location.reload()" style="background:#ef4444; border:none; padding:5px; font-size:10px; cursor:pointer">LOGOUT</button>
    </div>
</aside>

<main>
    <div style="height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; font-weight:bold">DASHBOARD</div>
    <div class="content" id="mainContent">
        <h1>Benvenuto!</h1>
        <p>Caricamento dati dal Cloud...</p>
    </div>
</main>

<script>
// CONFIGURAZIONE FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCxLfCQ8igfytfdMuiJIN6uSZq2fcY0xuQ",
    authDomain: "task-ufficio.firebaseapp.com",
    projectId: "task-ufficio",
    storageBucket: "task-ufficio.firebasestorage.app",
    messagingSenderId: "435367581032",
    appId: "1:435367581032:web:d77014469b570c9e9672dd"
};

// Inizializzazione
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// FUNZIONE DI LOGIN
document.getElementById('loginBtn').onclick = async () => {
    const name = document.getElementById('loginName').value.trim();
    const section = document.getElementById('loginSection').value;

    if(!name) { alert("Inserisci il tuo nome!"); return; }

    try {
        // Tentativo di scrittura su Firebase
        await db.collection("users").doc(name).set({
            name: name,
            section: section,
            lastAccess: new Date().toISOString()
        }, { merge: true });

        // Se arriviamo qui, Firebase ha risposto OK
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('userInfoDisplay').innerHTML = `<b>Utente:</b> ${name}<br><b>Reparto:</b> ${section}`;
        document.getElementById('mainContent').innerHTML = `<h2>Connessione Riuscita!</h2><p>Ciao <b>${name}</b>, sei collegato al database cloud.</p>`;
        
    } catch (e) {
        console.error(e);
        alert("ERRORE DI CONNESSIONE: Il database Firebase è bloccato. Controlla le 'Rules' (Regole) su Firebase Console!");
    }
};
</script>
</body>
</html>
