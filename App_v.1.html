<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Manager Ufficio - CLOUD v1.2</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
  /* STILI ORIGINALI RIPRISTINATI AL 100% */
  :root{
    --bg:#0f172a; --panel:#111827; --muted:#1f2937; --text:#e5e7eb;
    --text-dim:#9ca3af; --primary:#3b82f6; --danger:#ef4444;
    --warning:#f59e0b; --success:#10b981; --card:#0b1220;
    --border:#334155; --badge:#0a1222;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family: system-ui, -apple-system, sans-serif;
    background:linear-gradient(135deg,#0b1020,#0d1326 35%,#0f172a);
    color:var(--text);
  }
  header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:rgba(10,16,30,.8); backdrop-filter: blur(6px);
    border-bottom:1px solid var(--border);
  }
  header h1{ margin:0; font-size:18px; letter-spacing:.4px; }
  .user-chip{ display:flex; align-items:center; gap:8px; }
  .user-chip .dot{ width:8px; height:8px; border-radius:50%; background:var(--success); }
  .btn{ all:unset; cursor:pointer; padding:8px 12px; border:1px solid var(--border); border-radius:10px; background:var(--panel); text-align:center; }
  .btn:hover{ border-color:var(--primary) }
  .btn.primary{ background:var(--primary); color:white; border-color:transparent; }
  .btn.danger{ background:var(--danger); color:white; border-color:transparent; }
  .btn.small{ padding:4px 8px; border-radius:8px; font-size:12px; }

  .layout{ display:grid; grid-template-columns: 260px 1fr; min-height:calc(100dvh - 56px); }
  nav.sidebar{
    border-right:1px solid var(--border);
    padding:12px; position:sticky; top:56px; height:calc(100dvh - 56px);
    background:linear-gradient(180deg, rgba(20,26,46,.6), rgba(10,16,30,.4));
  }
  nav.sidebar h3{ font-size:12px; text-transform:uppercase; color:var(--text-dim); margin:8px 8px; }
  nav.sidebar .menu{ display:flex; flex-direction:column; gap:6px; }
  nav.sidebar button{
    all:unset; cursor:pointer; padding:10px 12px; border-radius:10px; display:flex; gap:10px; align-items:center; width:100%;
  }
  nav.sidebar button.active{ background:rgba(59,130,246,.18); outline:1px solid rgba(59,130,246,.35); }
  main{ padding:16px; overflow-y:auto; }
  
  /* Toolbar e Filtri */
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .search{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px 12px; min-width:240px; color:white; }
  
  /* Tabelle e Kanban ORIGINALI */
  table{ width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  th, td{ border-bottom:1px solid var(--border); padding:10px; text-align:left; font-size:14px; }
  th{ color:var(--text-dim); background:rgba(255,255,255,.02); }
  .kanban{ display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; }
  .col{ background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:10px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px; margin-bottom:8px; }
  .badge{ font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--border); background:var(--badge); }
  
  /* Modale Login */
  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.8); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal{ width:400px; background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:24px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>

<header>
  <h1 id="header-title">Task Manager — Cloud</h1>
  <div class="toolbar">
    <input id="searchInput" class="search" type="search" placeholder="Cerca...">
    <select id="sectionFilter" class="search"><option value="">Tutte le sezioni</option></select>
  </div>
  <div class="user-chip">
    <span id="userLabel" class="muted">Caricamento...</span>
    <button id="logoutBtn" class="btn small">Esci</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <h3>Menu</h3>
    <div class="menu">
      <button class="nav-item active" onclick="switchView('dashboard')">📊 Dashboard</button>
      <button class="nav-item" onclick="switchView('boardTask')">🗂 Kanban — Task</button>
      <button class="nav-item" onclick="switchView('registry')">📑 Registro Smarcamento</button>
      <button class="nav-item" onclick
