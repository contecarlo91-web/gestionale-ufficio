<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UFF-MANAGER v0.8 - Registro Attivo</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --primary:#3b82f6; --border:#334155; --card:#1e293b; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
        aside { width:260px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
        main { flex:1; display:flex; flex-direction:column; background:#0b1224; }
        .nav-item { padding:15px; cursor:pointer; border:none; background:none; color:#9ca3af; text-align:left; width:100%; transition:0.2s; }
        .nav-item:hover, .nav-item.active { color:white; background:rgba(59,130,246,0.1); }
        #loginOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .login-box { background:var(--panel); padding:30px; border-radius:15px; border:1px solid var(--border); width:350px; text-align:center; }
        input, select, button { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:white; }
        button.primary { background:var(--primary); border:none; cursor:pointer; font-weight:bold; }
        .content { padding:20px; flex:1; overflow-y:auto; }
        
        /* Tabella Registro */
        table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden; margin-top:10px; }
        th, td { padding:12px 15px; text-align:left; border-bottom:1px solid var(--border); }
        th { background:rgba(255,255,255,0.05); color:var(--primary); font-size:12px; text-transform:uppercase; }
        tr:hover { background:rgba(255,255,255,0.02); }
        .badge { background:var(--primary); padding:4px 8px; border-radius:5px; font-size:11px; font-weight:bold; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Accesso Gestionale</h2>
        <input type="text" id="loginName" placeholder="Tuo Nome (es. Mauro Ghezzi)">
        <select id="loginSection">
            <option value="Capo Ufficio">Capo Ufficio</option>
            <option value="Droni">Droni</option>
            <option value="Ala Rotante">Ala Rotante</option>
            <option value="Ala Fissa">Ala Fissa</option>
            <option value="Armamento">Armamento</option>
        </select>
        <button id="loginBtn" class="primary">Entra nel Sistema</button>
    </div>
</div>

<aside>
    <div style="padding:20px; font-weight:bold; color:var(--primary); font-size:1.2rem;">UFF-MANAGER v0.8</div>
    <nav>
        <button class="nav-item" onclick="switchView('dashboard')">📊 Dashboard</button>
        <button class="nav-item active" onclick="switchView('registro')">📑 Registro Smarcamento</button>
        <button class="nav-item" onclick="switchView('tasks')">📅 Task (Kanban)</button>
    </nav>
    <div style="margin-top:auto; padding:20px; border-top:1px solid var(--border)">
        <div id="userInfoDisplay" style="font-size:12px; margin-bottom:10px; color:#9ca3af"></div>
        <button onclick="location.reload()" style="background:#ef4444; border:none; padding:8px; font-size:12px; cursor:pointer; color:white">ESCI</button>
    </div>
</aside>

<main>
    <div style="height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px;">
        <div id="viewTitle" style="font-weight:bold; text-transform:uppercase">REGISTRO</div>
        <button id="addBtn" class="primary" style="width:auto; margin:0; padding:8px 20px">+ Nuovo Inserimento</button>
    </div>
    <div class="content" id="mainContent"></div>
</main>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCxLfCQ8igfytfdMuiJIN6uSZq2fcY0xuQ",
    authDomain: "task-ufficio.firebaseapp.com",
    projectId: "task-ufficio",
    storageBucket: "task-ufficio.firebasestorage.app",
    messagingSenderId: "435367581032",
    appId: "1:435367581032:web:d77014469b570c9e9672dd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user = null;
let currentView = 'registro';
let registroDati = [];

// LOGIN
document.getElementById('loginBtn').onclick = async () => {
    const name = document.getElementById('loginName').value.trim();
    const section = document.getElementById('loginSection').value;
    if(!name) return alert("Inserisci il nome!");

    user = { name, section };
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('userInfoDisplay').innerHTML = `Utente: <b>${name}</b><br>Reparto: <b>${section}</b>`;
    
    startSync();
};

function switchView(v) {
    currentView = v;
    document.getElementById('viewTitle').innerText = v;
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.toLowerCase().includes(v));
    });
    render();
}

// SINCRONIZZAZIONE REALTIME
function startSync() {
    db.collection("registro").orderBy("data", "desc").onSnapshot(snapshot => {
        registroDati = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
        render();
    });
}

// AGGIUNGI NUOVO RECORD
document.getElementById('addBtn').onclick = async () => {
    const attivita = prompt("Descrizione attività da registrare:");
    if(!attivita) return;

    try {
        await db.collection("registro").add({
            attivita: attivita,
            operatore: user.name,
            reparto: user.section,
            data: new Date().toISOString()
        });
    } catch (e) { alert("Errore nel salvataggio!"); }
};

// RENDERIZZA LA PAGINA
function render() {
    const out = document.getElementById('mainContent');
    
    if(currentView === 'registro') {
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Attività</th>
                        <th>Reparto</th>
                        <th>Operatore</th>
                    </tr>
                </thead>
                <tbody>`;
        
        registroDati.forEach(item => {
            const dataLocale = new Date(item.data).toLocaleString('it-IT', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
            html += `
                <tr>
                    <td style="color:#9ca3af; font-size:13px">${dataLocale}</td>
                    <td style="font-weight:bold">${item.attivita}</td>
                    <td><span class="badge">${item.reparto}</span></td>
                    <td style="color:var(--primary)">${item.operatore}</td>
                </tr>`;
        });
        
        html += `</tbody></table>`;
        out.innerHTML = registroDati.length > 0 ? html : "<p>Nessun dato presente nel registro.</p>";
    } else {
        out.innerHTML = `<h2>Sezione ${currentView}</h2><p>Lavoro in corso su questa sezione...</p>`;
    }
}
</script>
</body>
</html>
