<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UFF-MANAGER v0.9 - Full Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --primary:#3b82f6; --border:#334155; --card:#1e293b; --danger:#ef4444; }
        body { margin:0; font-family:sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }
        aside { width:260px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; }
        main { flex:1; display:flex; flex-direction:column; background:#0b1224; }
        .nav-item { padding:15px; cursor:pointer; border:none; background:none; color:#9ca3af; text-align:left; width:100%; transition:0.2s; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { color:white; background:rgba(59,130,246,0.1); border-left-color: var(--primary); }
        #loginOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); }
        .login-box { background:var(--panel); padding:30px; border-radius:15px; border:1px solid var(--border); width:350px; text-align:center; }
        input, select, textarea, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:white; font-size: 14px; }
        button.primary { background:var(--primary); border:none; cursor:pointer; font-weight:bold; }
        .content { padding:20px; flex:1; overflow-y:auto; }
        
        /* Tabelle e Kanban */
        table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden; }
        th, td { padding:12px; text-align:left; border-bottom:1px solid var(--border); font-size: 13px; }
        th { background:rgba(255,255,255,0.05); color:var(--primary); text-transform:uppercase; }
        .kanban-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap:15px; }
        .kanban-col { background: rgba(255,255,255,0.03); padding:10px; border-radius:10px; min-height: 400px; }
        .task-card { background: var(--card); padding:12px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px; cursor:grab; }
        .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:bold; background: var(--primary); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Accesso Gestionale</h2>
        <input type="text" id="loginName" placeholder="Tuo Nome (es. Mauro Ghezzi)">
        <select id="loginSection">
            <option value="Capo Ufficio">Capo Ufficio</option>
            <option value="Droni">Droni</option>
            <option value="Ala Rotante">Ala Rotante</option>
            <option value="Ala Fissa">Ala Fissa</option>
            <option value="Armamento">Armamento</option>
        </select>
        <button id="loginBtn" class="primary">Entra nel Sistema</button>
    </div>
</div>

<aside>
    <div style="padding:20px; font-weight:bold; color:var(--primary); font-size:1.1rem;">UFF-MANAGER v0.9</div>
    <nav>
        <button class="nav-item active" onclick="switchView('registro')">📑 Registro Smarcamento</button>
        <button class="nav-item" onclick="switchView('tasks')">🗂 Task (Kanban)</button>
        <button class="nav-item" onclick="switchView('note')">📝 Appunti & Note</button>
        <button class="nav-item" onclick="switchView('appuntamenti')">📅 Appuntamenti</button>
    </nav>
    <div style="margin-top:auto; padding:20px; border-top:1px solid var(--border)">
        <div id="userInfoDisplay" style="font-size:11px; margin-bottom:10px; color:#9ca3af"></div>
        <button onclick="location.reload()" style="background:var(--danger); border:none; padding:8px; font-size:11px; cursor:pointer; color:white">ESCI / CAMBIA UTENTE</button>
    </div>
</aside>

<main>
    <div style="height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; padding:0 20px;">
        <div id="viewTitle" style="font-weight:bold; text-transform:uppercase">REGISTRO SMARCAMENTO</div>
        <button id="actionBtn" class="primary" style="width:auto; margin:0; padding:8px 20px">+ AGGIUNGI</button>
    </div>
    <div class="content" id="mainContent"></div>
</main>
